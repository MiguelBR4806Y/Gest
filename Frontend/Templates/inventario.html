<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="/static/style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <title>Bravo'S Gest</title>
        <link rel="icon" href="/img/logo.jpg" type="image/png">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body class="bg-dark d-flex flex-column min-vh-100">
        <!--NavBar-->
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center" href="#">
                    <img src="/img/logo.jpg" class="rounded-circle me-2" style="width: 35px; height: 35px; object-fit: cover;">
                    B'Gest
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="btn btn-outline-light ms-2">Inventario</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="dashboard.html">Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="ventas.html">Ventas</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="clientes.html">Clientes</a>
                        </li>
                        <li class="nav-item d-flex align-items-center ms-2">
                            <span id="nombreUsuario" class="navbar-text text-light me-2"></span>
                            <button id="btnCerrarSesion" class="btn btn-outline-danger" onclick="cerrarSesion()" style="display:none;">
                                Cerrar sesión
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <!--Fin del Navbar-->

        <!-- Modal Agregar Producto -->
        <div class="modal fade" id="modalAgregarProducto" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Agregar producto</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Nombre *</label>
                            <input type="text" class="form-control" id="p-nombre" placeholder="Nombre del producto">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Categoría</label>
                            <input type="text" class="form-control" id="p-categoria" placeholder="Ej: Bebidas, Lácteos...">
                        </div>
                        <div class="row g-3">
                            <div class="col-6">
                                <label class="form-label">Stock inicial</label>
                                <input type="number" class="form-control" id="p-stock" value="0" min="0">
                            </div>
                            <div class="col-6">
                                <label class="form-label">Precio (C$)</label>
                                <input type="number" class="form-control" id="p-precio" value="0" min="0" step="0.01">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-success" onclick="agregarProducto()">Guardar</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Fin Modal Agregar Producto -->

        <!-- Modal Editar Producto -->
        <div class="modal fade" id="modalEditarProducto" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Editar producto</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="ep-id">
                        <div class="mb-3">
                            <label class="form-label">Nombre *</label>
                            <input type="text" class="form-control" id="ep-nombre">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Categoría</label>
                            <input type="text" class="form-control" id="ep-categoria">
                        </div>
                        <div class="row g-3">
                            <div class="col-6">
                                <label class="form-label">Stock</label>
                                <input type="number" class="form-control" id="ep-stock" min="0">
                            </div>
                            <div class="col-6">
                                <label class="form-label">Precio (C$)</label>
                                <input type="number" class="form-control" id="ep-precio" min="0" step="0.01">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-warning" onclick="guardarEdicionProducto()">Guardar cambios</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Fin Modal Editar Producto -->

        <main class="container py-4 flex-grow-1">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Inventario</h2>
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalAgregarProducto">
                    + Agregar producto
                </button>
            </div>
            <div class="card p-3">
                <div class="card-body">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Nombre</th>
                                <th>Categoría</th>
                                <th>Stock</th>
                                <th>Precio</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-inventario">
                            <tr>
                                <td colspan="6" class="text-center text-secondary">Cargando...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <footer class="bg-light bajo"> @Bravo'S Gest | 2026 | Terms of Services</footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="/static/Script.js"></script>
        <script src="/static/inventario.js"></script>
    </body>
</html>
