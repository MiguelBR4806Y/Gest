<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../Static/style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <title>Bravo'S Gest</title>
        <link rel="icon" href="../..//img/logo.jpg" type="image/png">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body class="bg-dark d-flex flex-column min-vh-100">
        <!--NavBar-->
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center" href="#">
                    <img src="../../img/logo.jpg" class="rounded-circle me-2" style="width: 35px; height: 35px; object-fit: cover;">
                    B'Gest
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="btn btn-outline-light ms-2">
                            Clientes
                            </a>
                        </li>
                        <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                        </li>
                        <li class="nav-item">
                        <a class="nav-link" href="inventario.html">Inventario</a>
                        </li>
                        <li class="nav-item">
                        <a class="nav-link" href="ventas.html">Ventas</a>
                        </li>
                        <li class="nav-item d-flex align-items-center ms-2">
                            <span id="nombreUsuario" class="navbar-text text-light me-2"></span>
                            <button id="btnCerrarSesion" class="btn btn-outline-danger" onclick="cerrarSesion()" style="display:none;">
                                Cerrar sesión
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <!--Fin del Navbar-->
        <main class="container py-4 flex-grow-1">

            <!-- Encabezado -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Clientes</h2>
                <button class="btn btn-success">+ Agregar cliente</button>
            </div>

            <!-- Resumen -->
            <div class="row g-4 mb-4">
                <div class="col-12 col-sm-4">
                    <div class="card p-3 text-center">
                        <div class="card-body">
                            <p class="text-secondary">Total clientes</p>
                            <h2 id="c-total">—</h2>
                            <small class="text-secondary">Registrados</small>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-sm-4">
                    <div class="card p-3 text-center">
                        <div class="card-body">
                            <p class="text-secondary">Con crédito activo</p>
                            <h2 id="c-credito">—</h2>
                            <small class="text-secondary">Clientes</small>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-sm-4">
                    <div class="card p-3 text-center">
                        <div class="card-body">
                            <p class="text-secondary">Total en créditos</p>
                            <h2 id="c-monto">—</h2>
                            <small class="text-secondary">C$ pendiente</small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabla de clientes -->
            <div class="card p-3">
                <div class="card-body">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Nombre</th>
                                <th>Teléfono</th>
                                <th>Crédito</th>
                                <th>Última compra</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-clientes">
                            <tr>
                                <td colspan="6" class="text-center text-secondary">Cargando...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
        <footer class="bg-light bajo"> @Bravo'S Gest | 2026 | Terms of Services</footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="../Static/Script.js"></script>
        <script src="../Static/cliente.js"></script>
    </body>
</html>
